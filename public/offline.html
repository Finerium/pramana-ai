<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pramana AI</title>
<style>
  :root { --bg:#f6f3ed; --surface:#fefdfb; --ink:#2b2a37; --muted:#6b6a78; --border:#e7e3da; --accent:#464f8f; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#29282f; --surface:#33323c; --ink:#eeecf0; --muted:#a3a2ad; --border:#46454f; --accent:#a9b2e6; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .kartu {
    max-width: 340px; width: 100%; text-align: center;
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 26px;
    padding: 36px 26px; display: flex; flex-direction: column; align-items: center; gap: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
  }
  .dot { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--accent); }
  h1 { margin: 0; font-size: 18px; font-weight: 650; line-height: 1.4; }
  p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.5; }
  button {
    min-height: 48px; padding: 0 22px; border: none; border-radius: 999px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="kartu">
    <span class="dot" aria-hidden="true"></span>
    <h1>Anda sedang luring</h1>
    <p>Sambungan internet sedang tidak tersedia. Halaman akan tampil kembali saat sambungan pulih.</p>
    <button type="button" onclick="location.reload()">Coba lagi</button>
  </div>
</body>
</html>
